<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nazorat Paneli</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        html, body, #map { height: 100%; width: 100%; margin: 0; padding: 0; }
        .custom-avatar-marker {
            border: 3px solid #ef4444;
            border-radius: 50%;
            background: white;
            overflow: hidden;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        .custom-avatar-marker img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body class="relative bg-gray-100 font-sans overflow-hidden">

    <div id="sidebar" class="absolute top-0 left-0 h-full w-72 bg-gray-900 text-white z-[999] transform -translate-x-full transition-transform duration-300 flex flex-col shadow-2xl">
        <div class="p-4 border-b border-gray-800 flex justify-between items-center bg-gray-950">
            <h2 id="sidebar-title" class="text-xl font-bold tracking-wide">Kuzatuv paneli</h2>
            <button type="button" onclick="toggleSidebar()" class="text-gray-400 hover:text-white text-2xl font-bold p-1">&times;</button>
        </div>
        <div id="user-list" class="flex-1 overflow-y-auto p-2 space-y-2"></div>
        <div class="p-3 border-t border-gray-800 space-y-2">
            <a href="{% url 'mobil' %}" class="block text-center text-sm text-blue-400 hover:text-blue-300">GPS panel</a>
            <a href="{% url 'logout' %}" class="block text-center text-sm text-gray-400 hover:text-white">Chiqish</a>
        </div>
    </div>

    <button type="button" onclick="toggleSidebar()" class="absolute top-4 left-4 bg-gray-900 text-white px-4 py-2.5 rounded-xl font-medium shadow-md hover:bg-gray-800 transition z-[998] flex items-center gap-2">
        ☰ <span id="btn-text">Ro'yxat</span>
    </button>

    <div id="map"></div>

    <script>
        var map = L.map('map', { zoomControl: false }).setView([41.311081, 69.240562], 12);
        L.control.zoom({ position: 'bottomright' }).addTo(map);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);
        var markers = {};

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
        }

        function getCookie(name) {
            const m = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
            return m ? decodeURIComponent(m[2]) : '';
        }

        async function yuklash() {
            try {
                let res = await fetch('{% url "api_map_data" %}', { credentials: 'same-origin' });
                if (res.status === 401 || res.status === 403) {
                    window.location.href = '{% url "login" %}';
                    return;
                }
                let data = await res.json();
                document.getElementById('sidebar-title').innerText = data.rejim === 'talim' ? 'Kelmaganlar' : 'Ishchilar';
                document.getElementById('btn-text').innerText = data.rejim === 'talim' ? 'Kelmaganlar' : 'Ishchilar';

                let listHtml = '';
                let seen = {};

                (data.majliz || []).forEach(function (p) {
                    if (p.lat == null || p.lng == null) return;
                    seen[p.id] = true;

                    if (markers[p.id]) {
                        markers[p.id].setLatLng([p.lat, p.lng]);
                        markers[p.id].setPopupContent('<b>' + p.ism + '</b><br>Tel: ' + p.telefon + '<br>Holat: ' + p.aloqa);
                    } else {
                        let myIcon = L.divIcon({
                            className: 'custom-avatar-marker',
                            html: '<img src="' + p.rasm + '" alt="" />',
                            iconSize: [45, 45],
                            iconAnchor: [22, 22]
                        });
                        markers[p.id] = L.marker([p.lat, p.lng], { icon: myIcon }).addTo(map)
                            .bindPopup('<b>' + p.ism + '</b><br>Tel: ' + p.telefon + '<br>Holat: ' + p.aloqa);
                    }

                    let statusColor = p.aloqa === 'onlayn' ? 'bg-green-500' : 'bg-red-500';
                    listHtml +=
                        '<div onclick="map.flyTo([' + p.lat + ', ' + p.lng + '], 16); toggleSidebar();" class="p-3 bg-gray-800 hover:bg-gray-700 rounded-xl cursor-pointer transition flex items-center gap-3">' +
                        '<div class="w-10 h-10 rounded-full overflow-hidden border border-gray-600"><img src="' + p.rasm + '" class="w-full h-full object-cover" alt="" /></div>' +
                        '<div class="flex-1"><h4 class="font-semibold text-sm">' + p.ism + '</h4><p class="text-xs text-gray-400">' + p.telefon + '</p></div>' +
                        '<span class="w-3 h-3 rounded-full ' + statusColor + '"></span></div>';
                });

                Object.keys(markers).forEach(function (id) {
                    if (!seen[id]) {
                        map.removeLayer(markers[id]);
                        delete markers[id];
                    }
                });

                document.getElementById('user-list').innerHTML = listHtml ||
                    '<p class="text-gray-500 text-sm p-3">Hozircha faol lokatsiya yo\'q</p>';
            } catch (err) {
                console.error('Xatolik:', err);
            }
        }

        setInterval(yuklash, 15000);
        yuklash();
    </script>
</body>
</html>
