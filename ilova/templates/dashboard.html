<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nazorat Paneli</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet"/>
    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <style>
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; }
        #map { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .maplibregl-ctrl-group { background: rgba(17,24,39,0.9) !important; border: 1px solid #374151 !important; }
        .maplibregl-ctrl-group button { background: transparent !important; }
        .maplibregl-ctrl-group button span { filter: invert(1); }
        .worker-marker { width: 44px; height: 44px; border-radius: 50%; overflow: hidden; cursor: pointer; transition: transform 0.2s; }
        .worker-marker:hover { transform: scale(1.15); }
        .worker-marker.online  { border: 3px solid #22c55e; box-shadow: 0 0 0 0 rgba(34,197,94,0.5); animation: pulse 2s infinite; }
        .worker-marker.offline { border: 3px solid #ef4444; }
        .worker-marker img { width: 100%; height: 100%; object-fit: cover; }
        .worker-marker .avatar-fallback { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 20px; background: #374151; }
        @keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(34,197,94,0.5)} 70%{box-shadow:0 0 0 10px rgba(34,197,94,0)} 100%{box-shadow:0 0 0 0 rgba(34,197,94,0)} }
    </style>
</head>
<body>
<div id="map"></div>

<!-- Sidebar -->
<div id="sidebar" class="absolute top-0 left-0 h-full w-72 bg-gray-900/95 backdrop-blur text-white z-[999] transform -translate-x-full transition-transform duration-300 flex flex-col shadow-2xl">
    <div class="p-4 border-b border-gray-800 flex justify-between items-center">
        <div>
            <h2 class="text-lg font-bold">Ishchilar</h2>
            <p id="worker-count" class="text-xs text-gray-400 mt-0.5">0 ta onlayn</p>
        </div>
        <button onclick="toggleSidebar()" class="text-gray-400 hover:text-white text-2xl p-1">&times;</button>
    </div>
    <div id="user-list" class="flex-1 overflow-y-auto p-2 space-y-2"></div>
    <div class="p-3 border-t border-gray-800 space-y-2">
        <div id="last-update" class="text-center text-xs text-gray-600">—</div>
        <a href="{% url 'ishchilar' %}" class="block text-center text-sm text-gray-400 hover:text-white">← Bosh sahifa</a>
        <a href="{% url 'logout' %}" class="block text-center text-sm text-gray-500 hover:text-red-400">Chiqish</a>
    </div>
</div>

<!-- Yuqori tugmalar -->
<div class="absolute top-4 left-4 z-[998] flex items-center gap-2">
    <button onclick="toggleSidebar()" class="bg-gray-900/90 backdrop-blur text-white px-4 py-2.5 rounded-xl font-medium shadow-md flex items-center gap-2 text-sm">
        ☰
        <span id="online-badge" class="bg-green-500 text-white text-xs rounded-full px-1.5 py-0.5 hidden">0</span>
    </button>
</div>

<!-- Xarita turi -->
<div class="absolute top-4 right-4 z-[998] bg-gray-900/90 backdrop-blur rounded-xl overflow-hidden shadow-md">
    <button onclick="setStyle('bright')" id="btn-bright"
        class="px-3 py-2 text-xs font-medium text-blue-400 border-b border-gray-700 block w-full text-left">🗺 Ko'cha</button>
    <button onclick="setStyle('satellite')" id="btn-satellite"
        class="px-3 py-2 text-xs font-medium text-gray-400 block w-full text-left">🛰 Satellit</button>
    <button onclick="setStyle('topo')" id="btn-topo"
        class="px-3 py-2 text-xs font-medium text-gray-400 block w-full text-left">🏔 Topografik</button>
</div>

<script>
const map = new maplibregl.Map({
    container: 'map',
    style: 'https://tiles.openfreemap.org/styles/bright',
    center: [69.240562, 41.311081],
    zoom: 12,
    attributionControl: false
});
map.addControl(new maplibregl.NavigationControl({ showCompass: false }), 'bottom-right');

const styles = {
    bright:    'https://tiles.openfreemap.org/styles/bright',
    satellite: 'https://tiles.openfreemap.org/styles/satellite',
    topo:      'https://tiles.openfreemap.org/styles/topo',
};
let activeStyle = 'bright';

function setStyle(name) {
    if (activeStyle === name) return;
    activeStyle = name;
    map.setStyle(styles[name]);
    ['bright','satellite','topo'].forEach(n => {
        const btn = document.getElementById('btn-' + n);
        btn.className = 'px-3 py-2 text-xs font-medium block w-full text-left ' +
            (n === name ? 'text-blue-400' : 'text-gray-400') +
            (n !== 'topo' ? ' border-b border-gray-700' : '');
    });
}

function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('-translate-x-full');
}

function timeStr() {
    const d = new Date();
    return [d.getHours(), d.getMinutes(), d.getSeconds()].map(n => String(n).padStart(2,'0')).join(':');
}

const markers = {};

async function yuklash() {
    try {
        const res = await fetch('{% url "api_map_data" %}', { credentials: 'same-origin' });
        if (res.status === 401 || res.status === 403) { window.location.href = '{% url "login" %}'; return; }
        const data = await res.json();
        const workers = data.majliz || [];
        const seenIds = {};
        let onlineCount = 0;
        let listHtml = '';

        workers.forEach(p => {
            seenIds[p.id] = true;
            const isOnline = p.aloqa === 'onlayn';
            if (isOnline) onlineCount++;

            if (p.lat != null && p.lng != null) {
                if (markers[p.id]) {
                    markers[p.id].setLngLat([p.lng, p.lat]);
                    const el = markers[p.id].getElement();
                    el.className = 'worker-marker ' + (isOnline ? 'online' : 'offline');
                } else {
                    const el = document.createElement('div');
                    el.className = 'worker-marker ' + (isOnline ? 'online' : 'offline');
                    if (p.rasm && p.rasm !== '/static/default_avatar.png') {
                        el.innerHTML = '<img src="' + p.rasm + '" alt=""/>';
                    } else {
                        el.innerHTML = '<div class="avatar-fallback">👤</div>';
                    }

                    const popup = new maplibregl.Popup({ offset: 25, closeButton: false })
                        .setHTML('<div style="color:#111;padding:4px"><b>' + p.ism + '</b><br><small>' + p.telefon + '</small><br>' +
                            '<span style="color:' + (isOnline ? '#16a34a' : '#dc2626') + '">' +
                            (isOnline ? '● Onlayn' : '● Oflayn') + '</span></div>');

                    markers[p.id] = new maplibregl.Marker({ element: el })
                        .setLngLat([p.lng, p.lat])
                        .setPopup(popup)
                        .addTo(map);
                }
            }

            const flyAction = p.lat ? 'map.flyTo({center:[' + p.lng + ',' + p.lat + '],zoom:17});toggleSidebar();' : '';
            listHtml +=
                '<div onclick="' + flyAction + '" class="p-3 bg-gray-800 hover:bg-gray-700 rounded-xl cursor-pointer flex items-center gap-3">' +
                '<div class="w-10 h-10 rounded-full overflow-hidden border-2 flex-shrink-0 ' + (isOnline ? 'border-green-500' : 'border-gray-600') + '">' +
                (p.rasm && p.rasm !== '/static/default_avatar.png'
                    ? '<img src="' + p.rasm + '" class="w-full h-full object-cover">'
                    : '<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center">👤</div>') +
                '</div><div class="flex-1 min-w-0"><p class="font-semibold text-sm truncate">' + p.ism + '</p>' +
                '<p class="text-xs text-gray-400">' + p.telefon + '</p></div>' +
                '<span class="w-2.5 h-2.5 rounded-full flex-shrink-0 ' + (isOnline ? 'bg-green-500' : 'bg-red-500') + '"></span></div>';
        });

        Object.keys(markers).forEach(id => {
            if (!seenIds[id]) { markers[id].remove(); delete markers[id]; }
        });

        document.getElementById('user-list').innerHTML = listHtml ||
            '<p class="text-gray-500 text-sm p-3">Faol lokatsiya yo\'q</p>';
        document.getElementById('worker-count').innerText = onlineCount + ' ta onlayn';
        document.getElementById('last-update').innerText = 'Yangilandi: ' + timeStr();
        const badge = document.getElementById('online-badge');
        badge.innerText = onlineCount;
        badge.classList.toggle('hidden', onlineCount === 0);
    } catch(e) { console.error(e); }
}

setInterval(yuklash, 1000);
map.on('load', yuklash);
</script>
</body>
</html>
