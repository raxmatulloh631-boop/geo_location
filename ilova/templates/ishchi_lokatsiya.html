<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>{{ profil.ism }} — Lokatsiya</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet"/>
    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <style>
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; }
        #map { position: absolute; top: 64px; left: 0; width: 100%; height: calc(100% - 64px); }
        .maplibregl-ctrl-group { background: rgba(17,24,39,0.9) !important; border: 1px solid #374151 !important; }
        .maplibregl-ctrl-group button { background: transparent !important; }
        .maplibregl-ctrl-group button span { filter: invert(1); }
        @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.6;transform:scale(1.2)} }
        .pulse { animation: pulse 1.5s infinite; }
    </style>
</head>
<body class="bg-gray-950 text-white">

<!-- Nav -->
<nav class="absolute top-0 left-0 right-0 h-16 bg-gray-900/95 backdrop-blur border-b border-gray-800 px-4 flex items-center justify-between z-50">
    <div class="flex items-center gap-3">
        <a href="{% url 'ishchilar' %}" class="text-gray-400 hover:text-white text-2xl leading-none">‹</a>
        <div class="w-9 h-9 rounded-full overflow-hidden bg-gray-700 flex-shrink-0">
            {% if profil.rasm %}
            <img src="{{ profil.rasm.url }}" class="w-full h-full object-cover">
            {% else %}
            <div class="w-full h-full flex items-center justify-center text-lg">👤</div>
            {% endif %}
        </div>
        <div>
            <p class="font-semibold text-sm leading-tight">{{ profil.ism }}</p>
            <p class="text-gray-400 text-xs">{{ profil.telefon }}</p>
        </div>
    </div>
    <div class="flex items-center gap-2">
        <span id="status-dot" class="w-2.5 h-2.5 rounded-full bg-gray-500"></span>
        <span id="status-text" class="text-gray-400 text-sm">Yuklanmoqda...</span>
        <span id="last-time" class="text-gray-600 text-xs"></span>
    </div>
</nav>

<div id="map"></div>

<!-- Koordinat panel -->
<div id="coord-panel" class="hidden absolute bottom-6 left-1/2 -translate-x-1/2 bg-gray-900/90 backdrop-blur border border-gray-700 rounded-2xl px-5 py-3 text-center z-50 shadow-xl">
    <p id="coord-text" class="text-gray-300 font-mono text-xs"></p>
    <p id="vaqt-text" class="text-gray-500 text-xs mt-0.5"></p>
</div>

<script>
const PROFIL_ID = {{ profil.id }};
const API_URL   = '/api/ishchi/' + PROFIL_ID + '/lokatsiya/';

const map = new maplibregl.Map({
    container: 'map',
    style: 'https://tiles.openfreemap.org/styles/bright',
    center: [69.240562, 41.311081],
    zoom: 14,
    attributionControl: false
});
map.addControl(new maplibregl.NavigationControl({ showCompass: false }), 'bottom-right');

let marker    = null;
let firstLoad = true;

// Ishchi marker
function markerEl(onlayn) {
    const el = document.createElement('div');
    el.style.cssText = 'width:44px;height:44px;border-radius:50%;overflow:hidden;' +
        'border:3px solid ' + (onlayn ? '#22c55e' : '#ef4444') + ';' +
        (onlayn ? 'box-shadow:0 0 0 0 rgba(34,197,94,0.5);animation:markerPulse 2s infinite;' : '');
    el.innerHTML = '{% if profil.rasm %}<img src="{{ profil.rasm.url }}" style="width:100%;height:100%;object-fit:cover">{% else %}<div style="width:100%;height:100%;background:#374151;display:flex;align-items:center;justify-content:center;font-size:20px">👤</div>{% endif %}';
    return el;
}

const style = document.createElement('style');
style.innerText = '@keyframes markerPulse{0%{box-shadow:0 0 0 0 rgba(34,197,94,0.5)}70%{box-shadow:0 0 0 12px rgba(34,197,94,0)}100%{box-shadow:0 0 0 0 rgba(34,197,94,0)}}}';
document.head.appendChild(style);

function yangilash() {
    fetch(API_URL, { credentials: 'same-origin' })
        .then(r => r.json())
        .then(data => {
            const dot  = document.getElementById('status-dot');
            const stEl = document.getElementById('status-text');
            const ltEl = document.getElementById('last-time');

            dot.className  = 'w-2.5 h-2.5 rounded-full ' + (data.onlayn ? 'bg-green-500 pulse' : 'bg-red-500');
            stEl.className = 'text-sm ' + (data.onlayn ? 'text-green-400' : 'text-red-400');
            stEl.innerText = data.onlayn ? '🟢 Onlayn' : '🔴 Oflayn';
            ltEl.innerText = data.vaqt || '';

            if (data.lat && data.lng) {
                const lnglat = [parseFloat(data.lng), parseFloat(data.lat)];

                if (marker) {
                    marker.setLngLat(lnglat);
                } else {
                    marker = new maplibregl.Marker({ element: markerEl(data.onlayn) })
                        .setLngLat(lnglat)
                        .addTo(map);
                }

                if (firstLoad) {
                    map.flyTo({ center: lnglat, zoom: 17, duration: 800 });
                    firstLoad = false;
                }

                const panel = document.getElementById('coord-panel');
                panel.classList.remove('hidden');
                document.getElementById('coord-text').innerText =
                    parseFloat(data.lat).toFixed(6) + ', ' + parseFloat(data.lng).toFixed(6);
                document.getElementById('vaqt-text').innerText = 'So\'nggi: ' + data.vaqt;
            }
        })
        .catch(() => { document.getElementById('status-text').innerText = 'Xatolik'; });
}

map.on('load', function() { yangilash(); setInterval(yangilash, 1000); });
</script>
</body>
</html>
